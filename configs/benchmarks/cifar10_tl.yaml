benchmark:
  id: cifar10_tl
  dataset: cifar10
  benchmark: tl
  architecture: efficientnetv2_rw_s
  description: CIFAR-10 transfer-learning benchmark from paper Table 1.
experiment_dir: experiments/cifar10/efficientnetv2_rw_s/cifar10_tl
train:
  seed: 42
  use_cuda: true
  dataset:
    name: cifar10
    num_classes: 10
    input_size: 144
    data_dir: data
    pkeep: 0.5
  train_data_augmentation:
    - random_flip
    - random_crop
    - random_rotation
    - color_jitter
    - cutmix
    - normalize
  model:
    architecture: efficientnetv2_rw_s
    input_channels: 3
    cifar_stem: false
    drop_rate: 0.25
    pretrained: true
  training:
    num_shadow_models: 256
    start_shadow_model_idx: 0
    end_shadow_model_idx: 255
    epochs: 5
    batch_size: 128
    num_workers: 4
    optimizer: adamw
    learning_rate: 0.0005
    weight_decay: 0.05
    betas: [0.9, 0.999]
    eps: 0.00000001
    lr_scheduler: onecycle
    use_amp: true
    save_step: 6
    save_models: true
    early_stopping: true
    patience: 10
    resume: false
  experiment:
    log_level: info
    checkpoint_dir: experiments/cifar10/efficientnetv2_rw_s/cifar10_tl
attack:
  attack:
    method: [lira]
    evaluation_mode: both
    compute_logits: true
    compute_scores: true
    perform_attack: true
    ntest: 1
    plot_metric: auc
    target_fprs: [0.00001, 0.001]
    prior: 0.5
    target_model: best
  inference_data_augmentations:
    mode: lira_aug
    aug: 18
  experiment:
    log_level: info
    checkpoint_dir: experiments/cifar10/efficientnetv2_rw_s/cifar10_tl
    overwrite_logits: false
    overwrite_scores: false
analysis:
  script: comprehensive_analysis/run_analysis.py
  target_fprs: [0.00001, 0.001]
  priors: [0.01, 0.1, 0.5]
