benchmark:
  id: purchase100_aof
  dataset: purchase
  benchmark: aof
  architecture: fcn
  description: Purchase-100 anti-overfitting FCN benchmark from paper Table 1.
experiment_dir: experiments/purchase/fcn/purchase100_aof
train:
  seed: 42
  use_cuda: true
  dataset:
    name: purchase
    num_classes: 100
    data_dir: data
    pkeep: 0.5
  train_data_augmentation: []
  model:
    architecture: fcn
    input_dim: 600
    hidden_dims: [1024, 512]
    drop_rate: 0.5
    activation: tanh
    pretrained: false
  training:
    num_shadow_models: 256
    start_shadow_model_idx: 0
    end_shadow_model_idx: 255
    epochs: 100
    batch_size: 128
    num_workers: 4
    optimizer: sgd
    learning_rate: 0.01
    weight_decay: 0.001
    momentum: 0.9
    lr_scheduler: cosine
    save_step: 101
    save_models: true
    early_stopping: true
    patience: 20
    resume: false
  experiment:
    log_level: info
    checkpoint_dir: experiments/purchase/fcn/purchase100_aof
attack:
  attack:
    method: [lira]
    evaluation_mode: both
    compute_logits: true
    compute_scores: true
    perform_attack: true
    ntest: 1
    plot_metric: auc
    target_fprs: [0.00001, 0.001]
    prior: 0.5
    target_model: best
  inference_data_augmentations:
    mode: lira_aug
    aug: 0
  experiment:
    log_level: info
    checkpoint_dir: experiments/purchase/fcn/purchase100_aof
    overwrite_logits: false
    overwrite_scores: false
analysis:
  script: comprehensive_analysis/run_analysis.py
  target_fprs: [0.00001, 0.001]
  priors: [0.01, 0.1, 0.5]
