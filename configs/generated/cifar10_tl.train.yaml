seed: 42
use_cuda: true
dataset:
  name: cifar10
  num_classes: 10
  input_size: 144
  data_dir: data
  pkeep: 0.5
train_data_augmentation:
- random_flip
- random_crop
- random_rotation
- color_jitter
- cutmix
- normalize
model:
  architecture: efficientnetv2_rw_s
  input_channels: 3
  cifar_stem: false
  drop_rate: 0.25
  pretrained: true
training:
  num_shadow_models: 256
  start_shadow_model_idx: 0
  end_shadow_model_idx: 9
  epochs: 5
  batch_size: 128
  num_workers: 4
  optimizer: adamw
  learning_rate: 0.0005
  weight_decay: 0.05
  betas:
  - 0.9
  - 0.999
  eps: 1.0e-08
  lr_scheduler: onecycle
  use_amp: true
  save_step: 6
  save_models: true
  early_stopping: true
  patience: 10
  resume: false
experiment:
  log_level: info
  checkpoint_dir: experiments/cifar10/efficientnetv2_rw_s/cifar10_tl
trclearaining:
  epochs: 1
