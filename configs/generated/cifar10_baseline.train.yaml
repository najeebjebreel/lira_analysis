seed: 42
use_cuda: true
dataset:
  name: cifar10
  num_classes: 10
  input_size: 32
  data_dir: data
  pkeep: 0.5
train_data_augmentation:
- random_flip
- random_crop
- cutout
- normalize
model:
  architecture: resnet18
  input_channels: 3
  cifar_stem: true
  drop_rate: 0.0
  pretrained: false
training:
  num_shadow_models: 256
  start_shadow_model_idx: 0
  end_shadow_model_idx: 9
  epochs: 1
  batch_size: 256
  num_workers: 4
  optimizer: sgd
  learning_rate: 0.1
  weight_decay: 0.0005
  momentum: 0.9
  lr_scheduler: cosine
  crop_padding_mode: reflect
  save_step: 101
  save_models: true
  early_stopping: true
  patience: 20
  resume: false
experiment:
  log_level: info
  checkpoint_dir: experiments/cifar10/resnet18/cifar10_baseline
